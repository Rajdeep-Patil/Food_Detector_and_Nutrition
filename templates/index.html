<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Food Detector and Nutrition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --gold: #f0a500;
    --gold-dim: #c47d00;
    --text: #f0ede6;
    --muted: #888;
    --danger: #e25c4a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
}
h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--gold);
    margin-bottom: 0.25rem;
}
.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.container { max-width: 900px; margin: 0 auto; }

/* Input Field for Username */
.user-input-wrap {
    margin-bottom: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1rem;
    border-radius: 12px;
}
.user-input-wrap label {
    display: block;
    font-size: 0.8rem;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    font-weight: 600;
}
.user-input-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 0.6rem 0.9rem;
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
}
.user-input-wrap input:focus { border-color: var(--gold); }

/* DB Meta Card */
.meta-card {
    background: #141923;
    border: 1px solid #1f2d3d;
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
}
.meta-item strong { color: var(--gold); }

/* Upload Zone */
.upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    background: var(--surface);
    position: relative;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--gold); background: #1f1a0f; }
.upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.upload-zone p { color: var(--muted); font-size: 0.9rem; }
.upload-zone strong { color: var(--gold); }

#preview-wrap { display: none; margin-top: 1.5rem; text-align: center; }
#preview-img { max-height: 280px; border-radius: 12px; border: 1px solid var(--border); }

.btn {
    display: block;
    margin: 1.25rem auto 0;
    background: var(--gold);
    color: #111;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    border: none;
    border-radius: 10px;
    padding: 0.75rem 2.5rem;
    cursor: pointer;
    letter-spacing: 0.02em;
}
.btn:hover { background: #ffb81c; }
.btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.spinner {
    display: none;
    margin: 1.5rem auto;
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
    display: none;
    background: #2a1212;
    border: 1px solid var(--danger);
    color: #f9a0a0;
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    font-size: 0.9rem;
    margin-top: 1rem;
}

#results { display: none; margin-top: 2.5rem; }
.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.section-title::before { content: '●'; font-size: 0.5rem; }

.tag-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
.tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.9rem;
    font-size: 0.82rem;
    color: var(--text);
    font-family: 'DM Sans', monospace;
}

.panels { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2rem; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.25rem 1rem; }

#nutrition-section { display: none; }
.nutrition-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow-x: auto; margin-bottom: 1.5rem; }
.nut-table { width: 100%; min-width: 700px; border-collapse: collapse; font-size: 0.85rem; }
.nut-table thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
.nut-table th { padding: 0.7rem 1rem; text-align: left; font-weight: 500; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; white-space: nowrap; }
.nut-table td { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
.nut-table tbody tr:last-child td { border-bottom: none; }
.food-name { font-weight: 500; color: var(--text); font-family: 'DM Sans', monospace; }
.conf-badge {
    display: inline-block; background: #1f1a0f; color: var(--gold); border-radius: 999px;
    padding: 0.1rem 0.55rem; font-size: 0.72rem; font-weight: 500; border: 1px solid #3a2e0a; margin-left: 0.4rem;
}
.num { text-align: right; color: var(--text); }
.na { color: var(--muted); font-style: italic; text-align: right; }

.totals-row { background: var(--surface2); border-top: 1.5px solid var(--gold-dim) !important; }
.totals-row td { font-family: 'Syne', sans-serif; font-weight: 600; color: var(--gold) !important; }

.summary-strip { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
.summary-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 1.2rem; flex: 1 1 140px; text-align: center; }
.pill-label { font-size: 0.72rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
.pill-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--gold); }
.pill-unit { font-size: 0.72rem; color: var(--muted); }

@media (max-width:768px){
    .nut-table { min-width:620px; font-size:12px; }
    .nut-table th, .nut-table td { padding:10px 12px; white-space: nowrap; }
}
</style>
</head>
<body>
<div class="container">
<h1>🍱 Food Detector and Nutrition</h1>
<p class="subtitle">Upload food photo — AI detects items & logs into securely linked MongoDB</p>

<!-- Name Input -->
<div class="user-input-wrap">
    <label for="username-input">User Name</label>
    <input type="text" id="username-input" placeholder="Enter your name" value="Anonymous" />
</div>

<!-- Upload Area -->
<div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.webp" />
    <div class="upload-icon">📷</div>
    <p><strong>Click to upload</strong> or drag & drop</p>
</div>

<div id="preview-wrap">
    <img id="preview-img" src="" alt="Preview" />
    <button class="btn" id="analyze-btn">Analyze Food</button>
</div>

<div class="spinner" id="spinner"></div>
<div class="error-box" id="error-box"></div>

<!-- Results display -->
<div id="results">
    <div class="meta-card">
        <div class="meta-item">👤 <strong>User:</strong> <span id="meta-user"></span></div>
    </div>

    <p class="section-title">Detected Foods</p>
    <div class="tag-wrap" id="tag-wrap"></div>

    <div class="panels">
        <div class="panel">
            <p class="section-title">Serving Sizes</p>
            <div id="serving-list" style="font-size:0.83rem; line-height:1.9;"></div>
        </div>
    </div>

    <div id="nutrition-section">
        <p class="section-title">Nutrition Breakdown</p>
        <div class="summary-strip" id="summary-strip"></div>
        <div class="nutrition-card">
            <table class="nut-table">
                <thead>
                    <tr>
                        <th>Food</th>
                        <th style="text-align:right">Cal (kcal)</th>
                        <th style="text-align:right">Sugar (g)</th>
                        <th style="text-align:right">Protein (g)</th>
                        <th style="text-align:right">Fiber (g)</th>
                    </tr>
                </thead>
                <tbody id="nut-body"></tbody>
            </table>
        </div>
    </div>
</div>
</div>

<script>
const dropZone      = document.getElementById('drop-zone');
const fileInput     = document.getElementById('file-input');
const usernameInput = document.getElementById('username-input');
const previewWrap   = document.getElementById('preview-wrap');
const previewImg    = document.getElementById('preview-img');
const analyzeBtn    = document.getElementById('analyze-btn');
const spinner       = document.getElementById('spinner');
const errorBox      = document.getElementById('error-box');
const results       = document.getElementById('results');

let selectedFile = null;

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag');
    handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewWrap.style.display = 'block';
    results.style.display = 'none';
    errorBox.style.display = 'none';
}

analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    analyzeBtn.disabled = true;
    spinner.style.display = 'block';
    errorBox.style.display = 'none';
    results.style.display = 'none';

    const fd = new FormData();
    fd.append('file', selectedFile);
    fd.append('user_name', usernameInput.value); 

    try {
        const res  = await fetch('/predict', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Prediction failed');
        renderResults(data);
    } catch (err) {
        errorBox.textContent = '⚠️ ' + err.message;
        errorBox.style.display = 'block';
    } finally {
        spinner.style.display = 'none';
        analyzeBtn.disabled = false;
    }
});

function renderResults(data) {
    document.getElementById('meta-user').textContent = data.user_name || 'Anonymous';

    const tagWrap = document.getElementById('tag-wrap');
    tagWrap.innerHTML = '';
    (data.labels || []).forEach(lbl => {
        const t = document.createElement('span');
        t.className = 'tag';
        t.textContent = lbl.trim();
        tagWrap.appendChild(t);
    });

    const nutSection = document.getElementById('nutrition-section');
    const nutBody    = document.getElementById('nut-body');
    const summStrip  = document.getElementById('summary-strip');
    const servList   = document.getElementById('serving-list');

    nutBody.innerHTML = '';
    summStrip.innerHTML = '';
    servList.innerHTML = '';

    if (data.nutrition && data.nutrition.foods && data.nutrition.foods.length) {
        nutSection.style.display = 'block';

        data.nutrition.foods.forEach(f => {
            if (f.serving && f.serving !== 'N/A') {
                servList.innerHTML += `<div><strong>${f.name.trim()}</strong> <span style="color:var(--muted)">${f.serving}</span></div>`;
            }
        });

        data.nutrition.foods.forEach(f => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="food-name">${f.name.trim()}</span><span class="conf-badge">${f.confidence}%</span></td>
                <td class="${f.calories === 'N/A' ? 'na' : 'num'}">${f.calories}</td>
                <td class="${f.sugar    === 'N/A' ? 'na' : 'num'}">${f.sugar}</td>
                <td class="${f.protein  === 'N/A' ? 'na' : 'num'}">${f.protein}</td>
                <td class="${f.fiber    === 'N/A' ? 'na' : 'num'}">${f.fiber}</td>`;
            nutBody.appendChild(row);
        });

        const t = data.nutrition.totals;
        const totRow = document.createElement('tr');
        totRow.className = 'totals-row';
        totRow.innerHTML = `
            <td>Total</td>
            <td class="num">${t.calories}</td>
            <td class="num">${t.sugar}</td>
            <td class="num">${t.protein}</td>
            <td class="num">${t.fiber}</td>`;
        nutBody.appendChild(totRow);

        const pills = [
            { label: 'Calories', val: t.calories, unit: 'kcal' },
            { label: 'Sugar',    val: t.sugar,    unit: 'g' },
            { label: 'Protein',  val: t.protein,  unit: 'g' },
            { label: 'Fiber',    val: t.fiber,    unit: 'g' },
        ];
        pills.forEach(p => {
            summStrip.innerHTML += `
                <div class="summary-pill">
                    <div class="pill-label">${p.label}</div>
                    <div class="pill-val">${p.val}</div>
                    <div class="pill-unit">${p.unit}</div>
                </div>`;
        });
    } else {
        nutSection.style.display = 'none';
    }
    results.style.display = 'block';
}
</script>
</body>
</html>
